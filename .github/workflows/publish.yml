name: publish

on:
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: pypi-publish
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout release tag or selected branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: >-
            ${{ github.event_name == 'release'
                && github.event.release.tag_name
                || github.event.repository.default_branch }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest

      - name: Run Ruff
        run: uv run ruff check .

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout release tag or selected branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: >-
            ${{ github.event_name == 'release'
                && github.event.release.tag_name
                || github.event.repository.default_branch }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: uv build

      - name: Check release tag matches built package
        if: github.event_name == 'release'
        shell: bash
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          package_version="$(python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheel = next(Path("dist").glob("*.whl"))
          with ZipFile(wheel) as archive:
              metadata = next(name for name in archive.namelist() if name.endswith(".dist-info/METADATA"))
              for line in archive.read(metadata).decode("utf-8").splitlines():
                  if line.startswith("Version: "):
                      print(line.removeprefix("Version: "))
                      break
              else:
                  raise SystemExit("wheel metadata does not contain a version")
          PY
          )"
          if [ "${TAG_NAME}" != "v${package_version}" ]; then
            echo "::error::release tag must match the built package version"
            printf 'tag: %s\nbuilt package: v%s\n' "${TAG_NAME}" "${package_version}"
            exit 1
          fi

      - name: Check package metadata
        run: uvx twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    needs:
      - test
      - build
    if: github.event_name == 'release' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/ptyolox-garage/
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: ${{ github.event_name != 'release' }}

  upload-release-assets:
    needs:
      - build
      - publish
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
